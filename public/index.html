<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Generator - Test UI</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="data:,">
    <meta http-equiv="Cache-Control" content="no-store" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <style>
        /* Inline minimal styles as fallback if CSS fails to load */
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: #0b1020; color: #e6e9f2; }
        .container { max-width: 960px; margin: 0 auto; padding: 24px; }
        .card { background: #121933; border: 1px solid #223; border-radius: 12px; padding: 20px; box-shadow: 0 6px 30px rgba(0,0,0,.25); }
        h1 { font-size: 22px; margin: 0 0 16px; }
        label { display:block; font-size: 13px; color:#aab1c6; margin: 12px 0 6px; }
        input, select { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #2a3358; background:#0e1430; color:#e6e9f2; outline:none; }
        .row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .actions { display:flex; gap:12px; margin-top:16px; }
        button { background:#4f46e5; color:white; border:none; padding:10px 14px; border-radius:8px; cursor:pointer; }
        button.secondary { background:#253056; }
        button:disabled { opacity:.6; cursor:not-allowed; }
        .small { font-size: 12px; color:#9aa3ba; }
        .log { white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; background:#0d122a; border:1px solid #223; border-radius:8px; padding:12px; height:160px; overflow:auto; }
        a { color:#8ab4ff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>PDF Generator - Test UI</h1>
            <div class="row">
                <div>
                    <label for="apiKey">API Key</label>
                    <input id="apiKey" placeholder="test-paid-key" value="test-paid-key" />
                </div>
                <div>
                    <label for="baseUrl">Server URL</label>
                    <input id="baseUrl" placeholder="http://localhost:3000" value="" />
                    <div class="small">Defaults to current origin if left blank.</div>
                </div>
            </div>

            <label for="url">Website URL</label>
            <input id="url" placeholder="https://example.com" value="https://example.com" />

            <div class="row">
                <div>
                    <label for="format">Format</label>
                    <select id="format">
                        <option value="A4" selected>A4</option>
                        <option value="Letter">Letter</option>
                        <option value="Legal">Legal</option>
                    </select>
                </div>
                <div>
                    <label for="platform">Platform</label>
                    <select id="platform">
                        <option value="">None</option>
                        <option value="wix">Wix</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div>
                    <label for="responseType">Response Type</label>
                    <select id="responseType">
                        <option value="url" selected>Temporary URL</option>
                        <option value="buffer">Buffer (base64)</option>
                    </select>
                </div>
                <div>
                    <label>Margins (px)</label>
                    <div class="row">
                        <input id="marginTop" type="number" placeholder="top" value="100" />
                        <input id="marginBottom" type="number" placeholder="bottom" value="100" />
                    </div>
                </div>
            </div>

            <div class="row">
                <div>
                    <label>&nbsp;</label>
                    <div class="row">
                        <input id="marginLeft" type="number" placeholder="left" value="50" />
                        <input id="marginRight" type="number" placeholder="right" value="50" />
                    </div>
                </div>
                <div></div>
            </div>

            <div class="actions">
                <button id="createJobBtn">Create PDF Job</button>
                <button id="cancelJobBtn" class="secondary" disabled>Cancel Job</button>
            </div>

            <div style="margin-top:20px; padding-top:20px; border-top:1px solid #223">
                <label for="checkJobIdInput">Check Job by ID</label>
                <div style="display:flex; gap:8px">
                    <input id="checkJobIdInput" placeholder="Enter job ID" style="flex:1" />
                    <button id="checkJobBtn" class="secondary">Check Job</button>
                </div>
            </div>

            <div style="margin-top:16px">
                <div class="small">Job ID: <span id="jobId">—</span></div>
            </div>

            <div style="margin-top:12px">
                <div class="small">Status</div>
                <div id="status" class="small">—</div>
            </div>

            <div style="margin-top:12px">
                <div class="small">Result</div>
                <div id="result"></div>
            </div>

            <div style="margin-top:12px">
                <div class="small">Logs</div>
                <div id="log" class="log"></div>
            </div>
        </div>
    </div>

    <script src="/app.js" defer></script>
</body>
</html>
